name: Scenario Suite - Monorepo Per-Component Independence

# End-to-end driver for the monorepo example. One repository, two independently
# versioned components:
#   - api at services/api on the api- tag line
#   - web at apps/web on the web- tag line
# Both share the dev -> staging -> prod ladder but advance on their own schedule.
#
# The suite proves the property that makes a monorepo worth adopting: advancing
# one component never touches the other. It advances api all the way through the
# ladder while asserting web's state subtree and tag namespace stay empty, then
# advances web and asserts api's already-published state is preserved untouched.
# Each component records under only its own state.components.<name> subtree and
# reads and writes only its own tag_prefix namespace.

on:
  workflow_dispatch:
    inputs:
      cascade_version:
        description: 'cascade rc tag to self-repin to (e.g. v0.15.0-rc.1). Empty runs committed defaults.'
        required: false
        default: ''
      cascade_version_sha:
        description: 'Peeled commit SHA paired with cascade_version. Empty runs committed defaults.'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

concurrency:
  group: scenario-suite
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
  CASCADE_STATE_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
  API_PATH: services/api
  WEB_PATH: apps/web

jobs:
  reset:
    name: Reset manifest state
    runs-on: ubuntu-latest
    outputs:
      window-start: ${{ steps.window.outputs.window-start }}
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Open reconcile window
        id: window
        run: |
          set -euo pipefail
          WINDOW_START="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "window-start=$WINDOW_START" >> "$GITHUB_OUTPUT"
          echo "reconcile window opened at $WINDOW_START"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Log cascade version mode
        run: |
          if [ -n "${{ inputs.cascade_version }}" ]; then
            echo "Running against dispatched rc: ${{ inputs.cascade_version }} (sha ${{ inputs.cascade_version_sha }})"
          else
            echo "Running against committed defaults (no rc dispatched)"
          fi

      - name: Self-repin manifest to the dispatched rc
        uses: stablekernel/cascade/.github/actions/fleet-repin@main
        with:
          cascade_version: ${{ inputs.cascade_version }}
          cascade_version_sha: ${{ inputs.cascade_version_sha }}
          token: ${{ secrets.CASCADE_STATE_TOKEN }}

      - name: Reset manifest state
        run: |
          yq eval '.ci.state = {}' -i .github/manifest.yaml
          git add -A
          git diff --cached --quiet || git commit --no-gpg-sign -m "chore: reset state for scenario test [skip ci]"
          git push origin main

      - name: Clean slate - delete leftover releases and tags
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName --jq '.[].tagName' \
            | while read -r t; do gh release delete "$t" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true; done
          git fetch --tags --quiet || true
          for t in $(git tag -l 'api-*' 'web-*' 'v*'); do git push origin --delete "$t" 2>/dev/null || true; done

      # A prior cycle can leave an open PR labeled cascade-hotfix or
      # cascade-hotfix-conflict targeting env/<component>/<env>, with a head
      # branch under hotfix/<component>/<env>/*. That PR is correct cascade
      # output, and a later hotfix-prod or hotfix-subenv job's preflight guard
      # will refuse to run while it is open ("a hotfix PR already targets
      # env/<c>/<env>"). Reap that residue here so a stray PR from one run
      # cannot block the next. Only hotfix/* and rollback/* refs are touched;
      # env/*, main and tags of record are never in scope.
      - name: Reap stale hotfix/rollback residue
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          for label in cascade-hotfix cascade-hotfix-conflict; do
            gh pr list --repo "$GITHUB_REPOSITORY" --state open --label "$label" \
              --json number,headRefName --jq '.[] | [.number, .headRefName] | @tsv' \
              | while IFS=$'\t' read -r number head; do
                  echo "closing stale $label PR #$number (head $head)"
                  gh pr close "$number" --repo "$GITHUB_REPOSITORY" --delete-branch \
                    --comment "Closed by the scenario-suite reset job: leftover from an earlier run." || true
                done
          done

          # Cancelled cycles can also leave a hotfix/* or rollback/* branch with
          # no open PR (rollback pushes its branch directly and never opens
          # one). Sweep those directly off the remote branch list.
          git ls-remote --heads origin | awk '{print $2}' | sed 's#^refs/heads/##' \
            | { grep -E '^(hotfix|rollback)/' || true; } \
            | while read -r ref; do
                echo "deleting dangling branch $ref"
                git push origin --delete "$ref" 2>/dev/null || true
              done
          echo "hotfix/rollback residue reaped"

      - name: Verify reset
        run: |
          state="$(yq eval '.ci.state' .github/manifest.yaml)"
          if [ "$state" != "{}" ] && [ -n "$state" ] && [ "$state" != "null" ]; then
            echo "::error::manifest ci.state is not clean: $state"
            exit 1
          fi
          echo "manifest state is clean"

  advance-api:
    name: Advance api through the ladder - web must stay untouched
    runs-on: ubuntu-latest
    needs: reset
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Seed an api change via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="scenario/api-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          # MUST touch services/api/** to match orchestrate-api's path filter and
          # scope the version bump to the api component only.
          mkdir -p "$API_PATH"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$API_PATH/version.txt"
          git add "$API_PATH/version.txt"
          git commit --no-gpg-sign -m "feat: api change for scenario test"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: api change for scenario test" \
            --body "Automated scenario run; drives orchestrate-api on merge."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          MERGE_SHA=$(git rev-parse origin/main)
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for orchestrate-api to complete
        id: wait_api
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          MERGE_SHA: ${{ steps.seed.outputs.merge_sha }}
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=orchestrate-api.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$MERGE_SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::no orchestrate-api.yaml run for merge $MERGE_SHA within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register orchestrate-api run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.wait_api.outputs.run_id }}
          expected-conclusion: success
          reason: advance-api-orchestrate
          upload: 'true'

      - name: Assert api seeded its own dev line and web is untouched
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          API_DEV=$(yq eval '.ci.state.components.api.dev.version // ""' .github/manifest.yaml)
          if ! echo "$API_DEV" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api dev version missing or not on the api- line: '$API_DEV'"
            exit 1
          fi
          WEB_STATE=$(yq eval '.ci.state.components.web // "ABSENT"' .github/manifest.yaml)
          if [ "$WEB_STATE" != "ABSENT" ]; then
            echo "::error::web state subtree is populated after an api-only change: $WEB_STATE"
            exit 1
          fi
          echo "OK: api dev=$API_DEV, web subtree untouched"

      # api rides the dev -> staging -> prod ladder one hop per dispatch, the
      # same way the single-component 3env suite drives its ladder: a
      # mode=default dispatch advances exactly one environment, so reaching prod
      # takes an explicit dev-to-staging hop followed by a staging-to-prod hop,
      # each awaited before the next. A single mode=default dispatch would stop
      # at staging and never populate api.prod.
      - name: Promote api dev to staging
        id: promote_api_staging
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=dev-to-staging --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-api dev-to-staging run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-api dev-to-staging run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_api_staging.outputs.run_id }}
          expected-conclusion: success
          reason: advance-api-promote-dev-to-staging
          upload: 'true'

      - name: Assert api reached staging and web is still untouched
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3
          ATTEMPT=0
          API_STAGING=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            git fetch origin main --quiet
            git reset --hard origin/main
            API_STAGING=$(yq eval '.ci.state.components.api.staging.version // ""' .github/manifest.yaml)
            [ -n "$API_STAGING" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            sleep 60
          done
          if ! echo "$API_STAGING" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api did not advance to staging on its own line: '$API_STAGING'"
            exit 1
          fi
          WEB_STATE=$(yq eval '.ci.state.components.web // "ABSENT"' .github/manifest.yaml)
          if [ "$WEB_STATE" != "ABSENT" ]; then
            echo "::error::web state subtree changed while only api advanced: $WEB_STATE"
            exit 1
          fi
          echo "OK: api staging=$API_STAGING, web subtree untouched"

      - name: Promote api staging to prod
        id: promote_api_prod
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=staging-to-prod --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-api staging-to-prod run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-api staging-to-prod run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_api_prod.outputs.run_id }}
          expected-conclusion: success
          reason: advance-api-promote-staging-to-prod
          upload: 'true'

      - name: Assert api reached prod and web is still untouched
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3
          ATTEMPT=0
          API_PROD=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            git fetch origin main --quiet
            git reset --hard origin/main
            API_PROD=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
            [ -n "$API_PROD" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            sleep 60
          done
          if ! echo "$API_PROD" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api did not advance to prod on its own line: '$API_PROD'"
            exit 1
          fi
          WEB_STATE=$(yq eval '.ci.state.components.web // "ABSENT"' .github/manifest.yaml)
          if [ "$WEB_STATE" != "ABSENT" ]; then
            echo "::error::web state subtree changed while only api advanced: $WEB_STATE"
            exit 1
          fi
          # Tag-namespace isolation: publishing api creates api- tags and never a
          # web- tag.
          git fetch --tags --quiet || true
          if [ -z "$(git tag -l 'api-*')" ]; then
            echo "::error::no api- tag exists after publishing api"
            exit 1
          fi
          if [ -n "$(git tag -l 'web-*')" ]; then
            echo "::error::a web- tag exists after an api-only advance: $(git tag -l 'web-*')"
            exit 1
          fi
          echo "OK: api prod=$API_PROD, web subtree and web- tag namespace untouched"

      - name: Snapshot component state after api advance
        if: always()
        run: |
          {
            echo "## advance-api Snapshot"
            echo ""
            echo '```yaml'
            yq eval '.ci.state.components' .github/manifest.yaml
            echo '```'
            echo ""
            echo "| Component | dev | staging | prod |"
            echo "|-----------|-----|---------|------|"
            echo "| api | $(yq eval '.ci.state.components.api.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.prod.version // "~"' .github/manifest.yaml) |"
            echo "| web | $(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

  advance-web:
    name: Advance web independently - api's published state must survive
    runs-on: ubuntu-latest
    needs: advance-api
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture api state before touching web
        id: api_before
        run: |
          set -euo pipefail
          git pull --rebase origin main --quiet || true
          API_PROD=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ -z "$API_PROD" ]; then
            echo "::error::api prod version absent before web advance; cannot prove preservation"
            exit 1
          fi
          echo "api_prod=$API_PROD" >> "$GITHUB_OUTPUT"
          echo "api prod before web advance: $API_PROD"

      - name: Seed a web change via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="scenario/web-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          # MUST touch apps/web/** to match orchestrate-web's path filter and scope
          # the version bump to the web component only.
          mkdir -p "$WEB_PATH"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$WEB_PATH/version.txt"
          git add "$WEB_PATH/version.txt"
          git commit --no-gpg-sign -m "feat: web change for scenario test"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: web change for scenario test" \
            --body "Automated scenario run; drives orchestrate-web on merge."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          MERGE_SHA=$(git rev-parse origin/main)
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for orchestrate-web to complete
        id: wait_web
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          MERGE_SHA: ${{ steps.seed.outputs.merge_sha }}
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=orchestrate-web.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$MERGE_SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::no orchestrate-web.yaml run for merge $MERGE_SHA within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register orchestrate-web run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.wait_web.outputs.run_id }}
          expected-conclusion: success
          reason: advance-web-orchestrate
          upload: 'true'

      - name: Assert web seeded its own line and api's published state survived
        env:
          API_PROD_BEFORE: ${{ steps.api_before.outputs.api_prod }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          WEB_DEV=$(yq eval '.ci.state.components.web.dev.version // ""' .github/manifest.yaml)
          if ! echo "$WEB_DEV" | grep -qE '^web-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::web dev version missing or not on the web- line: '$WEB_DEV'"
            exit 1
          fi
          API_PROD_AFTER=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ "$API_PROD_AFTER" != "$API_PROD_BEFORE" ]; then
            echo "::error::api prod version changed while only web advanced: before='$API_PROD_BEFORE' after='$API_PROD_AFTER'"
            exit 1
          fi
          # Tag-namespace isolation the other way: web now has a web- tag and api's
          # tags are preserved.
          git fetch --tags --quiet || true
          if [ -z "$(git tag -l 'web-*')" ]; then
            echo "::error::no web- tag exists after advancing web"
            exit 1
          fi
          if [ -z "$(git tag -l 'api-*')" ]; then
            echo "::error::api- tags disappeared while advancing web"
            exit 1
          fi
          echo "OK: web dev=$WEB_DEV advanced independently; api prod=$API_PROD_AFTER preserved"

      # Drive web the rest of the way to prod on its own line, one hop per
      # dispatch, exactly as api did. api's already-published state must survive
      # every hop.
      - name: Promote web dev to staging
        id: promote_web_staging
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-web.yaml -f mode=dev-to-staging --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-web.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-web dev-to-staging run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-web dev-to-staging run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_web_staging.outputs.run_id }}
          expected-conclusion: success
          reason: advance-web-promote-dev-to-staging
          upload: 'true'

      - name: Promote web staging to prod
        id: promote_web_prod
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-web.yaml -f mode=staging-to-prod --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-web.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-web staging-to-prod run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-web staging-to-prod run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_web_prod.outputs.run_id }}
          expected-conclusion: success
          reason: advance-web-promote-staging-to-prod
          upload: 'true'

      - name: Assert web reached prod and api's published state survived
        env:
          API_PROD_BEFORE: ${{ steps.api_before.outputs.api_prod }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3
          ATTEMPT=0
          WEB_PROD=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            git fetch origin main --quiet
            git reset --hard origin/main
            WEB_PROD=$(yq eval '.ci.state.components.web.prod.version // ""' .github/manifest.yaml)
            [ -n "$WEB_PROD" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            sleep 60
          done
          if ! echo "$WEB_PROD" | grep -qE '^web-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::web did not advance to prod on its own line: '$WEB_PROD'"
            exit 1
          fi
          API_PROD_AFTER=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ "$API_PROD_AFTER" != "$API_PROD_BEFORE" ]; then
            echo "::error::api prod version changed while web advanced to prod: before='$API_PROD_BEFORE' after='$API_PROD_AFTER'"
            exit 1
          fi
          # Both namespaces coexist: web now has a prod release on the web- line
          # and api's api- tags are still present and untouched.
          git fetch --tags --quiet || true
          if [ -z "$(git tag -l 'web-*')" ]; then
            echo "::error::no web- tag exists after advancing web to prod"
            exit 1
          fi
          if [ -z "$(git tag -l 'api-*')" ]; then
            echo "::error::api- tags disappeared while advancing web to prod"
            exit 1
          fi
          echo "OK: web prod=$WEB_PROD; api prod=$API_PROD_AFTER preserved; both namespaces coexist"

      - name: Final snapshot - both components coexist on independent lines
        if: always()
        run: |
          {
            echo "## advance-web Final Snapshot"
            echo ""
            echo '```yaml'
            yq eval '.ci.state.components' .github/manifest.yaml
            echo '```'
            echo ""
            echo "| Component | dev | staging | prod |"
            echo "|-----------|-----|---------|------|"
            echo "| api | $(yq eval '.ci.state.components.api.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.prod.version // "~"' .github/manifest.yaml) |"
            echo "| web | $(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

  wave:
    name: Shared-path wave - one commit fires both components concurrently
    runs-on: ubuntu-latest
    needs: advance-web
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # A change to the shared library both components consume must advance BOTH
      # component lines. Because orchestrate-api and orchestrate-web each watch
      # libs/common/** and run under their own per-component concurrency group,
      # one trunk commit fans out to two orchestrate runs that execute at the
      # same time and write the same ci.state file concurrently. The proof is
      # postcondition-based and interleaving-independent: both dev lines advance
      # and both tag namespaces gain a fresh rc. A write that actually exhausted
      # its retry ceiling would fail the orchestrate run outright, so both runs
      # concluding with success already rules that out; there is no need to
      # separately inspect the run logs. That is the guarantee the concurrent-write
      # re-apply gives: the two writers converge rather than one clobbering the other.
      - name: Capture both dev lines before the shared change
        id: before
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          API_DEV_BEFORE=$(yq eval '.ci.state.components.api.dev.version // ""' .github/manifest.yaml)
          WEB_DEV_BEFORE=$(yq eval '.ci.state.components.web.dev.version // ""' .github/manifest.yaml)
          if [ -z "$API_DEV_BEFORE" ] || [ -z "$WEB_DEV_BEFORE" ]; then
            echo "::error::both dev lines must be seeded before the wave: api='$API_DEV_BEFORE' web='$WEB_DEV_BEFORE'"
            exit 1
          fi
          echo "api_dev_before=$API_DEV_BEFORE" >> "$GITHUB_OUTPUT"
          echo "web_dev_before=$WEB_DEV_BEFORE" >> "$GITHUB_OUTPUT"
          echo "before: api dev=$API_DEV_BEFORE web dev=$WEB_DEV_BEFORE"

      - name: Seed ONE shared-library change via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="scenario/shared-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          # Touch ONLY libs/common/** so neither component's own path changes.
          # The shared path is in both orchestrate path filters, so this single
          # commit fires orchestrate-api AND orchestrate-web off the same sha.
          mkdir -p libs/common
          echo "revision=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > libs/common/version.txt
          git add libs/common/version.txt
          git commit --no-gpg-sign -m "feat: shared library change for both components"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: shared library change for both components" \
            --body "Automated scenario run; one shared-path commit drives both orchestrate workflows concurrently."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          MERGE_SHA=$(git rev-parse origin/main)
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          echo "shared commit merged as $MERGE_SHA"

      - name: Resolve both orchestrate runs off the shared commit
        id: runs
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          MERGE_SHA: ${{ steps.seed.outputs.merge_sha }}
        run: |
          set -euo pipefail
          resolve() {
            local wf="$1" run_id="" attempt=0
            while [ "$attempt" -lt 10 ]; do
              run_id=$(gh run list --workflow="$wf" --branch=main \
                --json=databaseId,headSha \
                --jq=".[] | select(.headSha==\"$MERGE_SHA\") | .databaseId" 2>/dev/null | head -n1)
              [ -n "$run_id" ] && break
              attempt=$((attempt + 1))
              [ "$attempt" -lt 10 ] && sleep 60
            done
            printf '%s' "$run_id"
          }
          API_RUN=$(resolve orchestrate-api.yaml)
          WEB_RUN=$(resolve orchestrate-web.yaml)
          if [ -z "$API_RUN" ] || [ -z "$WEB_RUN" ]; then
            echo "::error::one shared commit did not fan out to both orchestrate runs: api='$API_RUN' web='$WEB_RUN'"
            exit 1
          fi
          echo "api_run=$API_RUN" >> "$GITHUB_OUTPUT"
          echo "web_run=$WEB_RUN" >> "$GITHUB_OUTPUT"
          echo "both fired off $MERGE_SHA: orchestrate-api=$API_RUN orchestrate-web=$WEB_RUN"

      - name: Wait for both orchestrate runs to complete
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          API_RUN: ${{ steps.runs.outputs.api_run }}
          WEB_RUN: ${{ steps.runs.outputs.web_run }}
        run: |
          set -euo pipefail
          # Both were dispatched by the same push and run concurrently on GitHub.
          # Watching them one after the other simply blocks until each concludes.
          gh run watch "$API_RUN" --exit-status --interval 60
          gh run watch "$WEB_RUN" --exit-status --interval 60

      - name: Register orchestrate-api wave run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.runs.outputs.api_run }}
          expected-conclusion: success
          reason: wave-orchestrate-api
          upload: 'true'

      - name: Register orchestrate-web wave run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.runs.outputs.web_run }}
          expected-conclusion: success
          reason: wave-orchestrate-web
          upload: 'true'

      - name: Assert both dev lines converged and gained a fresh rc tag
        env:
          API_DEV_BEFORE: ${{ steps.before.outputs.api_dev_before }}
          WEB_DEV_BEFORE: ${{ steps.before.outputs.web_dev_before }}
        run: |
          set -euo pipefail

          # 1) Both concurrent writers converged: each dev line advanced past its
          #    pre-wave value and stayed on its own tag line. Neither write was
          #    lost, which is exactly what a clobber would have caused.
          git fetch origin main --quiet
          git reset --hard origin/main
          API_DEV_AFTER=$(yq eval '.ci.state.components.api.dev.version // ""' .github/manifest.yaml)
          WEB_DEV_AFTER=$(yq eval '.ci.state.components.web.dev.version // ""' .github/manifest.yaml)
          if ! echo "$API_DEV_AFTER" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api dev line missing or off its line after the wave: '$API_DEV_AFTER'"
            exit 1
          fi
          if ! echo "$WEB_DEV_AFTER" | grep -qE '^web-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::web dev line missing or off its line after the wave: '$WEB_DEV_AFTER'"
            exit 1
          fi
          if [ "$API_DEV_AFTER" = "$API_DEV_BEFORE" ]; then
            echo "::error::api dev line did not advance on the shared change: still '$API_DEV_AFTER'"
            exit 1
          fi
          if [ "$WEB_DEV_AFTER" = "$WEB_DEV_BEFORE" ]; then
            echo "::error::web dev line did not advance on the shared change: still '$WEB_DEV_AFTER'"
            exit 1
          fi

          # 2) Both tag namespaces gained the freshly computed dev rc.
          git fetch --tags --quiet || true
          if ! git rev-parse -q --verify "refs/tags/$API_DEV_AFTER" >/dev/null; then
            echo "::error::no tag for the new api dev version '$API_DEV_AFTER'"
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$WEB_DEV_AFTER" >/dev/null; then
            echo "::error::no tag for the new web dev version '$WEB_DEV_AFTER'"
            exit 1
          fi

          # 3) Both orchestrate runs already had to conclude with success to reach
          #    this step (see the "Wait for both orchestrate runs to complete" and
          #    "Register orchestrate-*" steps above). A write that exhausted its
          #    retry ceiling would have failed its run outright, so run success
          #    plus the leaf advances and tag existence checked above are the
          #    complete proof that both concurrent writers converged.

          echo "OK: shared change advanced api $API_DEV_BEFORE -> $API_DEV_AFTER and web $WEB_DEV_BEFORE -> $WEB_DEV_AFTER; both converged"

      - name: Wave snapshot
        if: always()
        run: |
          {
            echo "## Shared-path wave snapshot"
            echo ""
            echo "One commit to libs/common/** fired orchestrate-api and orchestrate-web concurrently."
            echo ""
            echo "| Component | dev before | dev after |"
            echo "|-----------|------------|-----------|"
            echo "| api | ${{ steps.before.outputs.api_dev_before }} | $(yq eval '.ci.state.components.api.dev.version // "~"' .github/manifest.yaml) |"
            echo "| web | ${{ steps.before.outputs.web_dev_before }} | $(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

  hotfix-subenv-api:
    name: Hotfix api staging - web subtree, branches and guard stay untouched
    runs-on: ubuntu-latest
    needs: wave
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Capture web's entire published subtree plus its branch and tag namespaces
      # before we touch api. Every isolation assertion below reads back against
      # this baseline: hotfixing api must not move a single web leaf, must not
      # create an env/web/* integration branch, and must not diverge web.
      - name: Capture web baseline and api staging precondition
        id: baseline
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          API_STAGING=$(yq eval '.ci.state.components.api.staging.version // ""' .github/manifest.yaml)
          if [ -z "$API_STAGING" ]; then
            echo "::error::api staging must be published before a staging hotfix; got empty"
            exit 1
          fi
          {
            echo "web_dev=$(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml)"
            echo "web_staging=$(yq eval '.ci.state.components.web.staging.version // "~"' .github/manifest.yaml)"
            echo "web_prod=$(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml)"
            echo "web_prod_sha=$(yq eval '.ci.state.components.web.prod.sha // "~"' .github/manifest.yaml)"
            echo "api_prod=$(yq eval '.ci.state.components.api.prod.version // "~"' .github/manifest.yaml)"
          } >> "$GITHUB_OUTPUT"
          git fetch origin '+refs/heads/env/*:refs/remotes/origin/env/*' --quiet 2>/dev/null || true
          echo "web baseline captured; api staging=$API_STAGING"

      - name: Seed an api trunk fix via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="scenario/hotfix-api-sub-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          mkdir -p "$API_PATH"
          echo "hotfix-sub=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$API_PATH/hotfix.txt"
          git add "$API_PATH/hotfix.txt"
          git commit --no-gpg-sign -s -m "fix: api trunk fix for staging hotfix"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "fix: api trunk fix for staging hotfix" \
            --body "Automated scenario run; trunk fix elevated to api staging via the hotfix chain."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          FIX_SHA=$(git rev-parse origin/main)
          echo "fix_sha=$FIX_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for the seed orchestrate-api run to settle
        id: seed_orch
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          FIX_SHA: ${{ steps.seed.outputs.fix_sha }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for _ in $(seq 1 10); do
            RUN_ID=$(gh run list --workflow=orchestrate-api.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$FIX_SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::seed fix did not fire orchestrate-api for $FIX_SHA"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register seed orchestrate-api run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.seed_orch.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-subenv-seed-orchestrate-api
          upload: 'true'

      - name: Dispatch api staging hotfix
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          FIX_SHA: ${{ steps.seed.outputs.fix_sha }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run cascade-hotfix-api.yaml \
            -f commit="$FIX_SHA" -f target_env=staging -f dry_run=false
          echo "ts=$TS" >> "$GITHUB_OUTPUT"

      - name: Await the hotfix plan/apply run
        id: plan
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          SINCE: ${{ steps.dispatch.outputs.ts }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=cascade-hotfix-api.yaml --event=workflow_dispatch \
              --created=">=$SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::api staging hotfix dispatch run did not appear"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register api staging hotfix plan/apply run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.plan.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-subenv-plan-apply-api
          upload: 'true'

      - name: Resolve and register the env/api/staging finalize run
        id: finalize
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          SINCE: ${{ steps.dispatch.outputs.ts }}
        run: |
          set -euo pipefail
          PR_HEAD=$(gh pr list --base env/api/staging --state all --label cascade-hotfix \
            --json number,headRefName --jq 'sort_by(.number) | last | .headRefName' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD" ]; then
            echo "::error::no merged cascade-hotfix PR into env/api/staging"
            exit 1
          fi
          RUN_ID=""
          for _ in $(seq 1 40); do
            RUN_ID=$(gh run list --workflow=cascade-hotfix-api.yaml --branch "$PR_HEAD" --event pull_request \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"$SINCE\")] | sort_by(.createdAt) | .[0].databaseId // empty" 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::no pull_request finalize run for env/api/staging head $PR_HEAD"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register env/api/staging finalize run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.finalize.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-subenv-finalize-env-api-staging
          upload: 'true'

      - name: Assert api staging diverged and web is wholly untouched
        env:
          FIX_SHA: ${{ steps.seed.outputs.fix_sha }}
          WEB_DEV: ${{ steps.baseline.outputs.web_dev }}
          WEB_STAGING: ${{ steps.baseline.outputs.web_staging }}
          WEB_PROD: ${{ steps.baseline.outputs.web_prod }}
          WEB_PROD_SHA: ${{ steps.baseline.outputs.web_prod_sha }}
        run: |
          set -euo pipefail
          REF=""
          for _ in 1 2 3 4 5; do
            git fetch origin main --quiet
            git reset --hard origin/main
            REF=$(yq eval '.ci.state.components.api.staging.ref // ""' .github/manifest.yaml)
            [ "$REF" = "env/api/staging" ] && break
            sleep 60
          done
          if [ "$REF" != "env/api/staging" ]; then
            echo "::error::api staging did not diverge onto its own integration branch: got '$REF'"
            exit 1
          fi
          VER=$(yq eval '.ci.state.components.api.staging.version // ""' .github/manifest.yaml)
          if ! echo "$VER" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+\.hotfix\.[0-9]+$'; then
            echo "::error::api staging version is not a component hotfix rc: '$VER'"
            exit 1
          fi
          if ! yq eval '.ci.state.components.api.staging.patches[]' .github/manifest.yaml | grep -qF "$FIX_SHA"; then
            echo "::error::api staging patches do not carry the seeded fix $FIX_SHA"
            exit 1
          fi
          # SIBLING ISOLATION: every web leaf holds its pre-hotfix value.
          for pair in "dev:$WEB_DEV" "staging:$WEB_STAGING" "prod:$WEB_PROD"; do
            e="${pair%%:*}"; want="${pair#*:}"
            got=$(yq eval ".ci.state.components.web.${e}.version // \"~\"" .github/manifest.yaml)
            if [ "$got" != "$want" ]; then
              echo "::error::web $e version moved during an api hotfix: before='$want' after='$got'"
              exit 1
            fi
          done
          got_prod_sha=$(yq eval '.ci.state.components.web.prod.sha // "~"' .github/manifest.yaml)
          if [ "$got_prod_sha" != "$WEB_PROD_SHA" ]; then
            echo "::error::web prod sha moved during an api hotfix: before='$WEB_PROD_SHA' after='$got_prod_sha'"
            exit 1
          fi
          # web must not be diverged and must own no integration branch.
          WEB_REF=$(yq eval '.ci.state.components.web.staging.ref // ""' .github/manifest.yaml)
          if [ -n "$WEB_REF" ]; then
            echo "::error::web staging carries a divergence ref after an api-only hotfix: '$WEB_REF'"
            exit 1
          fi
          git fetch origin '+refs/heads/env/*:refs/remotes/origin/env/*' --quiet 2>/dev/null || true
          if git for-each-ref --format='%(refname:short)' 'refs/remotes/origin/env/web/*' | grep -q .; then
            echo "::error::an env/web/* integration branch exists after an api-only hotfix"
            exit 1
          fi
          echo "OK: api staging diverged ($VER on $REF); web subtree, ref and branch namespace untouched"

      # Divergence guard: with api staging carrying non-trunk patches, a
      # promote-api staging-to-prod must be REFUSED by the guard. web is not
      # diverged, so this proves the guard is per-component: it fires on api and
      # never on web.
      - name: Assert promote-api from diverged staging is guarded
        id: guard
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          API_PROD_BEFORE: ${{ steps.baseline.outputs.api_prod }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=staging-to-prod --ref main
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --event=workflow_dispatch \
              --created=">=$TS" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::guarded promote-api run did not appear"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" --interval 60 >/dev/null 2>&1 || true
          CONCL=$(gh run view "$RUN_ID" --json conclusion --jq '.conclusion // "none"')
          if [ "$CONCL" != "failure" ]; then
            echo "::error::promote-api from diverged staging must fail via the guard; got '$CONCL'"
            exit 1
          fi
          LOG=$(gh run view "$RUN_ID" --log-failed 2>/dev/null || gh run view "$RUN_ID" --log 2>/dev/null || echo "")
          if ! printf '%s' "$LOG" | grep -qF 'cannot promote from diverged environment'; then
            echo "::error::promote-api failed but not via the divergence guard"
            exit 1
          fi
          if ! printf '%s' "$LOG" | grep -qF 'must not propagate upward'; then
            echo "::error::guard message incomplete; expected 'must not propagate upward'"
            exit 1
          fi
          git fetch origin main --quiet
          git reset --hard origin/main
          API_PROD_AFTER=$(yq eval '.ci.state.components.api.prod.version // "~"' .github/manifest.yaml)
          if [ "$API_PROD_AFTER" != "$API_PROD_BEFORE" ]; then
            echo "::error::guarded promote wrote api prod state: before='$API_PROD_BEFORE' after='$API_PROD_AFTER'"
            exit 1
          fi
          echo "OK: divergence guard refused promote-api staging-to-prod; api prod unmoved"

      - name: Register guarded promote-api run (expected failure)
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.guard.outputs.run_id }}
          expected-conclusion: failure
          reason: hotfix-subenv-divergence-guard-api
          upload: 'true'

      # Rejoin: a forward promote INTO the diverged env ends the divergence. A
      # dev-to-staging promote rewrites api staging from a clean trunk SHA and
      # clears its ref.
      - name: Rejoin api staging by rolling forward
        id: rejoin
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=dev-to-staging --ref main
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --event=workflow_dispatch \
              --created=">=$TS" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::rejoin promote-api dev-to-staging run did not appear"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          REF="pending"
          for _ in 1 2 3 4 5; do
            git fetch origin main --quiet
            git reset --hard origin/main
            REF=$(yq eval '.ci.state.components.api.staging.ref // ""' .github/manifest.yaml)
            [ -z "$REF" ] && break
            sleep 60
          done
          if [ -n "$REF" ]; then
            echo "::error::api staging divergence did not clear on rejoin: ref still '$REF'"
            exit 1
          fi
          echo "OK: roll-forward rejoined api staging; ref cleared"

      - name: Register rejoin promote-api run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.rejoin.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-subenv-rejoin-api
          upload: 'true'

      - name: Hotfix sub-env snapshot
        if: always()
        run: |
          {
            echo "## api staging hotfix - sibling isolation"
            echo ""
            echo "api staging diverged onto env/api/staging then rejoined; web never moved."
            echo ""
            echo "| Component | dev | staging | prod |"
            echo "|-----------|-----|---------|------|"
            echo "| api | $(yq eval '.ci.state.components.api.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.prod.version // "~"' .github/manifest.yaml) |"
            echo "| web | $(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

  hotfix-prod-api:
    name: Hotfix api prod - prod-gate path, web prod untouched
    runs-on: ubuntu-latest
    needs: hotfix-subenv-api
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture web prod baseline and api prod precondition
        id: baseline
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          API_PROD=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ -z "$API_PROD" ]; then
            echo "::error::api prod must be published before a prod hotfix; got empty"
            exit 1
          fi
          {
            echo "api_prod_before=$API_PROD"
            echo "web_prod=$(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml)"
            echo "web_prod_sha=$(yq eval '.ci.state.components.web.prod.sha // "~"' .github/manifest.yaml)"
          } >> "$GITHUB_OUTPUT"
          echo "api prod precondition=$API_PROD"

      - name: Seed an api trunk fix via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="scenario/hotfix-api-prod-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          mkdir -p "$API_PATH"
          # Additive, uniquely named fix file. It exists on neither env/api/staging
          # nor env/api/prod, so each cherry-pick in the two-leg prod-gate chain is a
          # pure add that applies cleanly on BOTH legs. A fixed filename (or an
          # in-place edit) collides on prod: prod trails staging by several rc
          # versions and never carries staging's line, so the single-line
          # modify/modify produces a conflict that halts the chain and opens a
          # cascade-hotfix-conflict PR that never finalizes. The 4env suite's clean
          # multi-env hotfix uses the same per-run file naming.
          FIX_FILE="$API_PATH/hotfix-prod-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.txt"
          echo "api prod hotfix $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$FIX_FILE"
          git add "$FIX_FILE"
          git commit --no-gpg-sign -s -m "fix: api trunk fix for prod hotfix"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "fix: api trunk fix for prod hotfix" \
            --body "Automated scenario run; trunk fix elevated to api prod via the hotfix chain."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          FIX_SHA=$(git rev-parse origin/main)
          echo "fix_sha=$FIX_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for the seed orchestrate-api run to settle
        id: seed_orch
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          FIX_SHA: ${{ steps.seed.outputs.fix_sha }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for _ in $(seq 1 10); do
            RUN_ID=$(gh run list --workflow=orchestrate-api.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$FIX_SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::seed fix did not fire orchestrate-api for $FIX_SHA"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register seed orchestrate-api run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.seed_orch.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-prod-seed-orchestrate-api
          upload: 'true'

      - name: Dispatch api prod hotfix
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          FIX_SHA: ${{ steps.seed.outputs.fix_sha }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run cascade-hotfix-api.yaml \
            -f commit="$FIX_SHA" -f target_env=prod -f dry_run=false
          echo "ts=$TS" >> "$GITHUB_OUTPUT"

      - name: Await the hotfix plan/apply run
        id: plan
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          SINCE: ${{ steps.dispatch.outputs.ts }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=cascade-hotfix-api.yaml --event=workflow_dispatch \
              --created=">=$SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::api prod hotfix dispatch run did not appear"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register api prod hotfix plan/apply run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.plan.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-prod-plan-apply-api
          upload: 'true'

      # A prod-gate hotfix expands to the two-leg chain [staging, prod]. The apply
      # job cherry-picks the fix onto env/api/staging (the gate env below prod),
      # opens a cascade-hotfix PR, auto-merges it, then repeats onto env/api/prod
      # with its own cascade-hotfix PR. Each merged PR fires a pull_request finalize
      # run that records that env's divergence, so there are TWO finalize runs:
      # staging first, then prod. Resolve, watch and register both here. Every
      # in-window run (seed orchestrate, plan/apply, both finalizes, and the rejoin
      # promote below) is then accounted for by reconcile.
      - name: Resolve and register the env/api/staging chain finalize run
        id: finalize_staging
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          SINCE: ${{ steps.dispatch.outputs.ts }}
        run: |
          set -euo pipefail
          PR_HEAD=$(gh pr list --base env/api/staging --state all --label cascade-hotfix \
            --json number,headRefName --jq 'sort_by(.number) | last | .headRefName' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD" ]; then
            echo "::error::no merged cascade-hotfix PR into env/api/staging"
            exit 1
          fi
          RUN_ID=""
          for _ in $(seq 1 40); do
            RUN_ID=$(gh run list --workflow=cascade-hotfix-api.yaml --branch "$PR_HEAD" --event pull_request \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"$SINCE\")] | sort_by(.createdAt) | .[0].databaseId // empty" 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::no pull_request finalize run for env/api/staging head $PR_HEAD"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register env/api/staging chain finalize run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.finalize_staging.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-prod-finalize-env-api-staging
          upload: 'true'

      - name: Resolve and register the env/api/prod chain finalize run
        id: finalize_prod
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          SINCE: ${{ steps.dispatch.outputs.ts }}
        run: |
          set -euo pipefail
          PR_HEAD=$(gh pr list --base env/api/prod --state all --label cascade-hotfix \
            --json number,headRefName --jq 'sort_by(.number) | last | .headRefName' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD" ]; then
            echo "::error::no merged cascade-hotfix PR into env/api/prod (the prod leg did not apply cleanly)"
            exit 1
          fi
          RUN_ID=""
          for _ in $(seq 1 40); do
            RUN_ID=$(gh run list --workflow=cascade-hotfix-api.yaml --branch "$PR_HEAD" --event pull_request \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"$SINCE\")] | sort_by(.createdAt) | .[0].databaseId // empty" 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::no pull_request finalize run for env/api/prod head $PR_HEAD"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register env/api/prod chain finalize run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.finalize_prod.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-prod-finalize-env-api-prod
          upload: 'true'

      - name: Assert api prod diverged via the prod-gate and web prod untouched
        env:
          FIX_SHA: ${{ steps.seed.outputs.fix_sha }}
          API_PROD_BEFORE: ${{ steps.baseline.outputs.api_prod_before }}
          WEB_PROD: ${{ steps.baseline.outputs.web_prod }}
          WEB_PROD_SHA: ${{ steps.baseline.outputs.web_prod_sha }}
        run: |
          set -euo pipefail
          # The two-leg prod-gate chain lands two state commits in sequence: staging
          # diverges first, then prod. Each leg carries cascade's mergeability poll
          # plus a serialized finalize, so allow up to ~25 minutes for BOTH refs to
          # settle before asserting.
          PREF=""; SREF=""
          for _ in $(seq 1 25); do
            git fetch origin main --quiet
            git reset --hard origin/main
            PREF=$(yq eval '.ci.state.components.api.prod.ref // ""' .github/manifest.yaml)
            SREF=$(yq eval '.ci.state.components.api.staging.ref // ""' .github/manifest.yaml)
            [ "$PREF" = "env/api/prod" ] && [ "$SREF" = "env/api/staging" ] && break
            sleep 60
          done
          if [ "$SREF" != "env/api/staging" ]; then
            echo "::error::api staging (the prod-gate env) did not diverge onto its own integration branch: got '$SREF'"
            exit 1
          fi
          if [ "$PREF" != "env/api/prod" ]; then
            echo "::error::api prod did not diverge onto its own integration branch: got '$PREF'"
            exit 1
          fi
          VER=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          # PROD LEG (released-hotfix form): the prod leg hotfixes api prod off a
          # PUBLISHED version (no rc segment), so cascade allocates the next free
          # patch bump (api-0.1.0 -> api-0.1.1, api-0.1.2, ... reconciled against
          # existing tags), NOT the rc-nested .hotfix.N shape the staging leg
          # produces. See cascade internal/hotfix/finalize.go allocateVersion: an
          # rc base gets a nested .hotfix.M segment, a published base gets the next
          # free patch bump. So the prod version is a plain published api- version
          # (no rc, no hotfix segment) strictly above the pre-hotfix prod version.
          if ! echo "$VER" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::api prod version is not a released-hotfix patch bump: '$VER'"
            exit 1
          fi
          if [ "$VER" = "$API_PROD_BEFORE" ]; then
            echo "::error::api prod version did not bump on the prod hotfix: still '$VER'"
            exit 1
          fi
          SVER=$(yq eval '.ci.state.components.api.staging.version // ""' .github/manifest.yaml)
          if ! echo "$SVER" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+\.hotfix\.[0-9]+$'; then
            echo "::error::api staging version is not a component hotfix rc: '$SVER'"
            exit 1
          fi
          if ! yq eval '.ci.state.components.api.prod.patches[]' .github/manifest.yaml | grep -qF "$FIX_SHA"; then
            echo "::error::api prod patches do not carry the seeded fix $FIX_SHA"
            exit 1
          fi
          if ! yq eval '.ci.state.components.api.staging.patches[]' .github/manifest.yaml | grep -qF "$FIX_SHA"; then
            echo "::error::api staging patches do not carry the seeded fix $FIX_SHA"
            exit 1
          fi
          # SIBLING ISOLATION: web prod holds its pre-hotfix version and sha.
          got=$(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml)
          if [ "$got" != "$WEB_PROD" ]; then
            echo "::error::web prod version moved during an api prod hotfix: before='$WEB_PROD' after='$got'"
            exit 1
          fi
          got_sha=$(yq eval '.ci.state.components.web.prod.sha // "~"' .github/manifest.yaml)
          if [ "$got_sha" != "$WEB_PROD_SHA" ]; then
            echo "::error::web prod sha moved during an api prod hotfix: before='$WEB_PROD_SHA' after='$got_sha'"
            exit 1
          fi
          WEB_REF=$(yq eval '.ci.state.components.web.prod.ref // ""' .github/manifest.yaml)
          if [ -n "$WEB_REF" ]; then
            echo "::error::web prod carries a divergence ref after an api-only hotfix: '$WEB_REF'"
            exit 1
          fi
          echo "OK: api staging ($SVER on $SREF) then prod ($VER on $PREF) diverged via the prod-gate; web prod untouched"

      - name: Rejoin api by rolling forward to prod
        id: rejoin
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=dev-to-prod --ref main
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --event=workflow_dispatch \
              --created=">=$TS" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::rejoin promote-api dev-to-prod run did not appear"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          # dev-to-prod also updates staging, so both chain envs rejoin.
          REF="pending"
          for _ in 1 2 3 4 5; do
            git fetch origin main --quiet
            git reset --hard origin/main
            PREF=$(yq eval '.ci.state.components.api.prod.ref // ""' .github/manifest.yaml)
            SREF=$(yq eval '.ci.state.components.api.staging.ref // ""' .github/manifest.yaml)
            if [ -z "$PREF" ] && [ -z "$SREF" ]; then REF=""; break; fi
            sleep 60
          done
          if [ -n "$REF" ]; then
            echo "::error::api prod/staging divergence did not clear on rejoin"
            exit 1
          fi
          echo "OK: roll-forward rejoined api prod and staging; refs cleared"

      - name: Register rejoin promote-api run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.rejoin.outputs.run_id }}
          expected-conclusion: success
          reason: hotfix-prod-rejoin-api
          upload: 'true'

      - name: Prod hotfix snapshot
        if: always()
        run: |
          {
            echo "## api prod hotfix - prod-gate and sibling isolation"
            echo ""
            echo "api prod diverged onto env/api/prod then rejoined; web prod never moved."
          } >> "$GITHUB_STEP_SUMMARY"

  rollback-api:
    name: Rollback api prod - api leaf reverts, web prod untouched
    runs-on: ubuntu-latest
    needs: hotfix-prod-api
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture api prod current and a prior target, plus web baseline
        id: baseline
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          CUR_VER=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          CUR_SHA=$(yq eval '.ci.state.components.api.prod.sha // ""' .github/manifest.yaml)
          if [ -z "$CUR_VER" ] || [ -z "$CUR_SHA" ]; then
            echo "::error::api prod must be published before rollback"
            exit 1
          fi
          # Resolve a prior published api- release to roll back to, ignoring the
          # current version. This keeps the assertion independent of the ring's
          # internal ordering.
          PRIOR_VER=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName --jq "[.[] | select(.tagName | startswith(\"api-\")) | select(.tagName != \"$CUR_VER\")] | .[0].tagName // empty" 2>/dev/null || echo "")
          if [ -z "$PRIOR_VER" ]; then
            echo "::error::no prior api- release to roll back to; ring has only $CUR_VER"
            exit 1
          fi
          {
            echo "cur_ver=$CUR_VER"
            echo "cur_sha=$CUR_SHA"
            echo "prior_ver=$PRIOR_VER"
            echo "web_prod=$(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml)"
            echo "web_prod_sha=$(yq eval '.ci.state.components.web.prod.sha // "~"' .github/manifest.yaml)"
          } >> "$GITHUB_OUTPUT"
          echo "rollback target: $CUR_VER -> $PRIOR_VER"

      - name: Dispatch api prod rollback
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          PRIOR_VER: ${{ steps.baseline.outputs.prior_ver }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run cascade-rollback-api.yaml \
            -f environment=prod -f target="$PRIOR_VER" -f dry_run=false
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=cascade-rollback-api.yaml --event=workflow_dispatch \
              --created=">=$TS" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::api rollback dispatch run did not appear"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register api rollback run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.dispatch.outputs.run_id }}
          expected-conclusion: success
          reason: rollback-api-prod
          upload: 'true'

      - name: Assert api prod rolled back and web prod untouched
        env:
          CUR_VER: ${{ steps.baseline.outputs.cur_ver }}
          CUR_SHA: ${{ steps.baseline.outputs.cur_sha }}
          PRIOR_VER: ${{ steps.baseline.outputs.prior_ver }}
          WEB_PROD: ${{ steps.baseline.outputs.web_prod }}
          WEB_PROD_SHA: ${{ steps.baseline.outputs.web_prod_sha }}
        run: |
          set -euo pipefail
          # Rollback rewrites an env that already had a version, so poll until the
          # api prod sha actually changes off its pre-rollback value.
          NEW_SHA="$CUR_SHA"
          for _ in 1 2 3 4 5; do
            git fetch origin main --quiet
            git reset --hard origin/main
            NEW_SHA=$(yq eval '.ci.state.components.api.prod.sha // ""' .github/manifest.yaml)
            [ -n "$NEW_SHA" ] && [ "$NEW_SHA" != "$CUR_SHA" ] && break
            sleep 60
          done
          if [ "$NEW_SHA" = "$CUR_SHA" ] || [ -z "$NEW_SHA" ]; then
            echo "::error::api prod sha did not change after rollback (still '$CUR_SHA')"
            exit 1
          fi
          NEW_VER=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ "$NEW_VER" != "$PRIOR_VER" ]; then
            echo "::error::api prod did not roll back to the prior version: want '$PRIOR_VER' got '$NEW_VER'"
            exit 1
          fi
          REF=$(yq eval '.ci.state.components.api.prod.ref // ""' .github/manifest.yaml)
          if [ "$REF" != "rollback/api/prod" ]; then
            echo "::error::api prod not marked diverged by rollback: ref='$REF'"
            exit 1
          fi
          # SIBLING ISOLATION: web prod holds its version and sha across the api rollback.
          got=$(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml)
          if [ "$got" != "$WEB_PROD" ]; then
            echo "::error::web prod version moved during an api rollback: before='$WEB_PROD' after='$got'"
            exit 1
          fi
          got_sha=$(yq eval '.ci.state.components.web.prod.sha // "~"' .github/manifest.yaml)
          if [ "$got_sha" != "$WEB_PROD_SHA" ]; then
            echo "::error::web prod sha moved during an api rollback: before='$WEB_PROD_SHA' after='$got_sha'"
            exit 1
          fi
          WEB_REF=$(yq eval '.ci.state.components.web.prod.ref // ""' .github/manifest.yaml)
          if [ -n "$WEB_REF" ]; then
            echo "::error::web prod carries a divergence ref after an api rollback: '$WEB_REF'"
            exit 1
          fi
          echo "OK: api prod rolled $CUR_VER -> $NEW_VER (ref=$REF); web prod untouched"

      - name: Rejoin api prod by rolling forward
        id: rejoin
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=dev-to-prod --ref main
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --event=workflow_dispatch \
              --created=">=$TS" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::rejoin promote-api dev-to-prod run did not appear"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          REF="pending"
          for _ in 1 2 3 4 5; do
            git fetch origin main --quiet
            git reset --hard origin/main
            REF=$(yq eval '.ci.state.components.api.prod.ref // ""' .github/manifest.yaml)
            [ -z "$REF" ] && break
            sleep 60
          done
          if [ -n "$REF" ]; then
            echo "::error::api prod rollback divergence did not clear on rejoin: ref still '$REF'"
            exit 1
          fi
          echo "OK: roll-forward rejoined api prod; rollback ref cleared"

      - name: Register rejoin promote-api run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.rejoin.outputs.run_id }}
          expected-conclusion: success
          reason: rollback-api-rejoin
          upload: 'true'

      - name: Rollback snapshot
        if: always()
        run: |
          {
            echo "## api rollback - sibling isolation"
            echo ""
            echo "api prod rolled back onto rollback/api/prod then rejoined; web prod never moved."
          } >> "$GITHUB_STEP_SUMMARY"

  rc-reap-isolation-api:
    name: RC-reap isolation - publishing api never reaps web rc tags
    runs-on: ubuntu-latest
    needs: rollback-api
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Drain any in-flight or queued promote-api and orchestrate-api runs left by
      # earlier and sibling jobs before we seed and measure. Every promote-api run
      # shares the single "promote-api" concurrency group (cancel-in-progress:false),
      # so uncoordinated dispatches publish in serialized, staggered waves. If one of
      # those waves lands after we seed, it reaps our freshly seeded api rc between
      # the seed and our own publish; if one lands during the assert, it reaps the
      # remaining api rc after the poll window closes. Waiting for the group to go
      # idle first guarantees a single deterministic publish -> reap to observe.
      - name: Quiesce in-flight promote-api and orchestrate-api runs
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 900 ))
          while :; do
            p_run=$(gh run list --workflow=promote-api.yaml --status=in_progress \
              --limit=100 --json=databaseId --jq='length' 2>/dev/null || echo 0)
            p_queue=$(gh run list --workflow=promote-api.yaml --status=queued \
              --limit=100 --json=databaseId --jq='length' 2>/dev/null || echo 0)
            o_run=$(gh run list --workflow=orchestrate-api.yaml --status=in_progress \
              --limit=100 --json=databaseId --jq='length' 2>/dev/null || echo 0)
            o_queue=$(gh run list --workflow=orchestrate-api.yaml --status=queued \
              --limit=100 --json=databaseId --jq='length' 2>/dev/null || echo 0)
            total=$((p_run + p_queue + o_run + o_queue))
            if [ "$total" -eq 0 ]; then
              echo "promote-api and orchestrate-api are idle; safe to seed and publish"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::promote-api/orchestrate-api did not quiesce within the timeout (promote in_progress=$p_run queued=$p_queue; orchestrate in_progress=$o_run queued=$o_queue)"
              exit 1
            fi
            echo "waiting for quiesce: promote in_progress=$p_run queued=$p_queue; orchestrate in_progress=$o_run queued=$o_queue"
            sleep 30
          done

      # Seed a fresh web dev rc so the web tag namespace holds an unpublished rc
      # that MUST survive the api publish below. cascade's rc-tag reaper is scoped
      # to a component's own tag_prefix, so publishing api can only reap api-*-rc.*.
      - name: Seed a fresh web dev rc
        id: seed_web
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="scenario/reap-web-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          mkdir -p "$WEB_PATH"
          echo "reap-web=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$WEB_PATH/version.txt"
          git add "$WEB_PATH/version.txt"
          git commit --no-gpg-sign -s -m "feat: web change to seed a surviving web rc"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: web change to seed a surviving web rc" \
            --body "Automated scenario run; seeds a web dev rc that must outlive an api publish."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          SHA=$(git rev-parse origin/main)
          RUN_ID=""
          for _ in $(seq 1 10); do
            RUN_ID=$(gh run list --workflow=orchestrate-web.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::web seed did not fire orchestrate-web for $SHA"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register web rc-seed orchestrate run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.seed_web.outputs.run_id }}
          expected-conclusion: success
          reason: rc-reap-seed-orchestrate-web
          upload: 'true'

      - name: Seed a fresh api dev rc
        id: seed_api
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="scenario/reap-api-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          mkdir -p "$API_PATH"
          echo "reap-api=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$API_PATH/version.txt"
          git add "$API_PATH/version.txt"
          git commit --no-gpg-sign -s -m "feat: api change to seed an api rc for reaping"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: api change to seed an api rc for reaping" \
            --body "Automated scenario run; seeds an api dev rc that the api publish reaps."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          SHA=$(git rev-parse origin/main)
          RUN_ID=""
          for _ in $(seq 1 10); do
            RUN_ID=$(gh run list --workflow=orchestrate-api.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::api seed did not fire orchestrate-api for $SHA"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register api rc-seed orchestrate run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.seed_api.outputs.run_id }}
          expected-conclusion: success
          reason: rc-reap-seed-orchestrate-api
          upload: 'true'

      - name: Capture both rc namespaces before the api publish
        id: before
        run: |
          set -euo pipefail
          git fetch origin main --tags --quiet
          # Count PLAIN rc tags only (grammar <component>-X.Y.Z-rc.N). A publish
          # reaps a component's superseded plain rc tags; hotfix-integration rc
          # tags (<component>-X.Y.Z-rc.N.hotfix.M) are a separate lifecycle reaped
          # by the hotfix-rejoin path, not by a plain publish. Scope both counts to
          # plain rc, excluding any .hotfix. variant, so the assert measures what
          # the publish reaper actually targets and compares api with web like for
          # like.
          API_RC=$(git tag -l | { grep -Ec '^api-[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' || true; })
          WEB_RC=$(git tag -l | { grep -Ec '^web-[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' || true; })
          if [ "$API_RC" -eq 0 ]; then
            echo "::error::no api rc tags to reap before the publish"
            exit 1
          fi
          if [ "$WEB_RC" -eq 0 ]; then
            echo "::error::no web rc tags to protect before the publish"
            exit 1
          fi
          echo "web_rc=$WEB_RC" >> "$GITHUB_OUTPUT"
          echo "before publish: api rc=$API_RC web rc=$WEB_RC"

      - name: Publish api to prod (triggers the component-scoped rc reaper)
        id: publish
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=dev-to-prod --ref main
          RUN_ID=""
          for _ in $(seq 1 15); do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --event=workflow_dispatch \
              --created=">=$TS" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            sleep 30
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::api publish dispatch run did not appear"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register api publish run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.publish.outputs.run_id }}
          expected-conclusion: success
          reason: rc-reap-publish-api
          upload: 'true'

      - name: Assert api rc reaped and web rc namespace survived
        env:
          WEB_RC_BEFORE: ${{ steps.before.outputs.web_rc }}
        run: |
          set -euo pipefail
          # The publish deletes rc release objects and their tags; refresh the
          # local tag view against the remote (prune stale, fetch current). The
          # reaper deletes tags at the end of a promotion that walks every
          # environment, so give it a bounded ~12 minutes to converge rather than
          # the previous 2.5 minutes, which could close before the single publish
          # finished reaping.
          # Count PLAIN rc tags only (grammar <component>-X.Y.Z-rc.N), excluding
          # hotfix-integration rc tags (<component>-X.Y.Z-rc.N.hotfix.M). Those
          # hotfix-rc tags are a separate lifecycle: a plain publish does not reap
          # them (they are reaped by the hotfix-rejoin path), so counting them here
          # would leave residue an earlier hotfix job seeded and the assert would
          # never reach 0. The regex anchors on -rc.N at end of line, so peeled
          # (^{}) annotated-tag lines and .hotfix. variants are both excluded.
          API_RC=0
          deadline=$(( $(date +%s) + 720 ))
          while :; do
            git fetch origin --tags --prune --force --quiet
            API_RC=$(git ls-remote --tags origin | { grep -Ec 'refs/tags/api-[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' || true; })
            [ "$API_RC" -eq 0 ] && break
            [ "$(date +%s)" -ge "$deadline" ] && break
            sleep 30
          done
          if [ "$API_RC" -ne 0 ]; then
            echo "::error::plain api rc tags were not reaped by the api publish: $API_RC remain"
            exit 1
          fi
          WEB_RC_AFTER=$(git ls-remote --tags origin | { grep -Ec 'refs/tags/web-[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' || true; })
          if [ "$WEB_RC_AFTER" -lt "$WEB_RC_BEFORE" ]; then
            echo "::error::an api publish reaped web rc tags: before=$WEB_RC_BEFORE after=$WEB_RC_AFTER"
            exit 1
          fi
          if [ "$WEB_RC_AFTER" -eq 0 ]; then
            echo "::error::web rc namespace is empty after an api publish; sibling isolation broken"
            exit 1
          fi
          echo "OK: api publish reaped api-*-rc.* to 0; web-*-rc.* survived ($WEB_RC_AFTER present)"

      - name: RC-reap snapshot
        if: always()
        run: |
          {
            echo "## RC-reap isolation"
            echo ""
            echo "Publishing api reaped only api-*-rc.* tags; web-*-rc.* were left intact,"
            echo "proving the component-scoped reaper never crosses a sibling's tag namespace."
          } >> "$GITHUB_STEP_SUMMARY"

  reconcile:
    name: Reconcile scenario-window runs
    needs: [reset, advance-api, advance-web, wave, hotfix-subenv-api, hotfix-prod-api, rollback-api, rc-reap-isolation-api]
    if: always()
    uses: stablekernel/cascade/.github/workflows/fleet-reconcile.yaml@main
    permissions:
      contents: read
      actions: read
    with:
      window-start: ${{ needs.reset.outputs.window-start }}
      cascade-ref: main
