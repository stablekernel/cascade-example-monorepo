name: Scenario Suite - Monorepo Per-Component Independence

# End-to-end driver for the monorepo example. One repository, two independently
# versioned components:
#   - api at services/api on the api- tag line
#   - web at apps/web on the web- tag line
# Both share the dev -> staging -> prod ladder but advance on their own schedule.
#
# The suite proves the property that makes a monorepo worth adopting: advancing
# one component never touches the other. It advances api all the way through the
# ladder while asserting web's state subtree and tag namespace stay empty, then
# advances web and asserts api's already-published state is preserved untouched.
# Each component records under only its own state.components.<name> subtree and
# reads and writes only its own tag_prefix namespace.

on:
  workflow_dispatch:
    inputs:
      cascade_version:
        description: 'cascade rc tag to self-repin to (e.g. v0.13.0-dryrun.46). Empty runs committed defaults.'
        required: false
        default: ''
      cascade_version_sha:
        description: 'Peeled commit SHA paired with cascade_version. Empty runs committed defaults.'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

concurrency:
  group: scenario-suite
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
  CASCADE_STATE_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
  API_PATH: services/api
  WEB_PATH: apps/web

jobs:
  reset:
    name: Reset manifest state
    runs-on: ubuntu-latest
    outputs:
      window-start: ${{ steps.window.outputs.window-start }}
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Open reconcile window
        id: window
        run: |
          set -euo pipefail
          WINDOW_START="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "window-start=$WINDOW_START" >> "$GITHUB_OUTPUT"
          echo "reconcile window opened at $WINDOW_START"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Log cascade version mode
        run: |
          if [ -n "${{ inputs.cascade_version }}" ]; then
            echo "Running against dispatched rc: ${{ inputs.cascade_version }} (sha ${{ inputs.cascade_version_sha }})"
          else
            echo "Running against committed defaults (no rc dispatched)"
          fi

      - name: Self-repin manifest to the dispatched rc
        uses: stablekernel/cascade/.github/actions/fleet-repin@main
        with:
          cascade_version: ${{ inputs.cascade_version }}
          cascade_version_sha: ${{ inputs.cascade_version_sha }}
          token: ${{ secrets.CASCADE_STATE_TOKEN }}

      - name: Reset manifest state
        run: |
          yq eval '.ci.state = {}' -i .github/manifest.yaml
          git add -A
          git diff --cached --quiet || git commit --no-gpg-sign -m "chore: reset state for scenario test [skip ci]"
          git push origin main

      - name: Clean slate - delete leftover releases and tags
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName --jq '.[].tagName' \
            | while read -r t; do gh release delete "$t" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true; done
          git fetch --tags --quiet || true
          for t in $(git tag -l 'api-*' 'web-*' 'v*'); do git push origin --delete "$t" 2>/dev/null || true; done

      - name: Verify reset
        run: |
          state="$(yq eval '.ci.state' .github/manifest.yaml)"
          if [ "$state" != "{}" ] && [ -n "$state" ] && [ "$state" != "null" ]; then
            echo "::error::manifest ci.state is not clean: $state"
            exit 1
          fi
          echo "manifest state is clean"

  advance-api:
    name: Advance api through the ladder - web must stay untouched
    runs-on: ubuntu-latest
    needs: reset
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Seed an api change via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="scenario/api-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          # MUST touch services/api/** to match orchestrate-api's path filter and
          # scope the version bump to the api component only.
          mkdir -p "$API_PATH"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$API_PATH/version.txt"
          git add "$API_PATH/version.txt"
          git commit --no-gpg-sign -m "feat: api change for scenario test"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: api change for scenario test" \
            --body "Automated scenario run; drives orchestrate-api on merge."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          MERGE_SHA=$(git rev-parse origin/main)
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for orchestrate-api to complete
        id: wait_api
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          MERGE_SHA: ${{ steps.seed.outputs.merge_sha }}
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=orchestrate-api.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$MERGE_SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::no orchestrate-api.yaml run for merge $MERGE_SHA within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register orchestrate-api run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.wait_api.outputs.run_id }}
          expected-conclusion: success
          reason: advance-api-orchestrate
          upload: 'true'

      - name: Assert api seeded its own dev line and web is untouched
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          API_DEV=$(yq eval '.ci.state.components.api.dev.version // ""' .github/manifest.yaml)
          if ! echo "$API_DEV" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api dev version missing or not on the api- line: '$API_DEV'"
            exit 1
          fi
          WEB_STATE=$(yq eval '.ci.state.components.web // "ABSENT"' .github/manifest.yaml)
          if [ "$WEB_STATE" != "ABSENT" ]; then
            echo "::error::web state subtree is populated after an api-only change: $WEB_STATE"
            exit 1
          fi
          echo "OK: api dev=$API_DEV, web subtree untouched"

      # api rides the dev -> staging -> prod ladder one hop per dispatch, the
      # same way the single-component 3env suite drives its ladder: a
      # mode=default dispatch advances exactly one environment, so reaching prod
      # takes an explicit dev-to-staging hop followed by a staging-to-prod hop,
      # each awaited before the next. A single mode=default dispatch would stop
      # at staging and never populate api.prod.
      - name: Promote api dev to staging
        id: promote_api_staging
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=dev-to-staging --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-api dev-to-staging run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-api dev-to-staging run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_api_staging.outputs.run_id }}
          expected-conclusion: success
          reason: advance-api-promote-dev-to-staging
          upload: 'true'

      - name: Assert api reached staging and web is still untouched
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3
          ATTEMPT=0
          API_STAGING=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            git fetch origin main --quiet
            git reset --hard origin/main
            API_STAGING=$(yq eval '.ci.state.components.api.staging.version // ""' .github/manifest.yaml)
            [ -n "$API_STAGING" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            sleep 60
          done
          if ! echo "$API_STAGING" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api did not advance to staging on its own line: '$API_STAGING'"
            exit 1
          fi
          WEB_STATE=$(yq eval '.ci.state.components.web // "ABSENT"' .github/manifest.yaml)
          if [ "$WEB_STATE" != "ABSENT" ]; then
            echo "::error::web state subtree changed while only api advanced: $WEB_STATE"
            exit 1
          fi
          echo "OK: api staging=$API_STAGING, web subtree untouched"

      - name: Promote api staging to prod
        id: promote_api_prod
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-api.yaml -f mode=staging-to-prod --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-api.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-api staging-to-prod run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-api staging-to-prod run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_api_prod.outputs.run_id }}
          expected-conclusion: success
          reason: advance-api-promote-staging-to-prod
          upload: 'true'

      - name: Assert api reached prod and web is still untouched
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3
          ATTEMPT=0
          API_PROD=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            git fetch origin main --quiet
            git reset --hard origin/main
            API_PROD=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
            [ -n "$API_PROD" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            sleep 60
          done
          if ! echo "$API_PROD" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api did not advance to prod on its own line: '$API_PROD'"
            exit 1
          fi
          WEB_STATE=$(yq eval '.ci.state.components.web // "ABSENT"' .github/manifest.yaml)
          if [ "$WEB_STATE" != "ABSENT" ]; then
            echo "::error::web state subtree changed while only api advanced: $WEB_STATE"
            exit 1
          fi
          # Tag-namespace isolation: publishing api creates api- tags and never a
          # web- tag.
          git fetch --tags --quiet || true
          if [ -z "$(git tag -l 'api-*')" ]; then
            echo "::error::no api- tag exists after publishing api"
            exit 1
          fi
          if [ -n "$(git tag -l 'web-*')" ]; then
            echo "::error::a web- tag exists after an api-only advance: $(git tag -l 'web-*')"
            exit 1
          fi
          echo "OK: api prod=$API_PROD, web subtree and web- tag namespace untouched"

      - name: Snapshot component state after api advance
        if: always()
        run: |
          {
            echo "## advance-api Snapshot"
            echo ""
            echo '```yaml'
            yq eval '.ci.state.components' .github/manifest.yaml
            echo '```'
            echo ""
            echo "| Component | dev | staging | prod |"
            echo "|-----------|-----|---------|------|"
            echo "| api | $(yq eval '.ci.state.components.api.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.prod.version // "~"' .github/manifest.yaml) |"
            echo "| web | $(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

  advance-web:
    name: Advance web independently - api's published state must survive
    runs-on: ubuntu-latest
    needs: advance-api
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture api state before touching web
        id: api_before
        run: |
          set -euo pipefail
          git pull --rebase origin main --quiet || true
          API_PROD=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ -z "$API_PROD" ]; then
            echo "::error::api prod version absent before web advance; cannot prove preservation"
            exit 1
          fi
          echo "api_prod=$API_PROD" >> "$GITHUB_OUTPUT"
          echo "api prod before web advance: $API_PROD"

      - name: Seed a web change via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="scenario/web-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          # MUST touch apps/web/** to match orchestrate-web's path filter and scope
          # the version bump to the web component only.
          mkdir -p "$WEB_PATH"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$WEB_PATH/version.txt"
          git add "$WEB_PATH/version.txt"
          git commit --no-gpg-sign -m "feat: web change for scenario test"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: web change for scenario test" \
            --body "Automated scenario run; drives orchestrate-web on merge."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          MERGE_SHA=$(git rev-parse origin/main)
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for orchestrate-web to complete
        id: wait_web
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          MERGE_SHA: ${{ steps.seed.outputs.merge_sha }}
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=orchestrate-web.yaml --branch=main \
              --json=databaseId,headSha \
              --jq=".[] | select(.headSha==\"$MERGE_SHA\") | .databaseId" 2>/dev/null | head -n1)
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::no orchestrate-web.yaml run for merge $MERGE_SHA within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register orchestrate-web run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.wait_web.outputs.run_id }}
          expected-conclusion: success
          reason: advance-web-orchestrate
          upload: 'true'

      - name: Assert web seeded its own line and api's published state survived
        env:
          API_PROD_BEFORE: ${{ steps.api_before.outputs.api_prod }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          WEB_DEV=$(yq eval '.ci.state.components.web.dev.version // ""' .github/manifest.yaml)
          if ! echo "$WEB_DEV" | grep -qE '^web-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::web dev version missing or not on the web- line: '$WEB_DEV'"
            exit 1
          fi
          API_PROD_AFTER=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ "$API_PROD_AFTER" != "$API_PROD_BEFORE" ]; then
            echo "::error::api prod version changed while only web advanced: before='$API_PROD_BEFORE' after='$API_PROD_AFTER'"
            exit 1
          fi
          # Tag-namespace isolation the other way: web now has a web- tag and api's
          # tags are preserved.
          git fetch --tags --quiet || true
          if [ -z "$(git tag -l 'web-*')" ]; then
            echo "::error::no web- tag exists after advancing web"
            exit 1
          fi
          if [ -z "$(git tag -l 'api-*')" ]; then
            echo "::error::api- tags disappeared while advancing web"
            exit 1
          fi
          echo "OK: web dev=$WEB_DEV advanced independently; api prod=$API_PROD_AFTER preserved"

      # Drive web the rest of the way to prod on its own line, one hop per
      # dispatch, exactly as api did. api's already-published state must survive
      # every hop.
      - name: Promote web dev to staging
        id: promote_web_staging
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-web.yaml -f mode=dev-to-staging --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-web.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-web dev-to-staging run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-web dev-to-staging run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_web_staging.outputs.run_id }}
          expected-conclusion: success
          reason: advance-web-promote-dev-to-staging
          upload: 'true'

      - name: Promote web staging to prod
        id: promote_web_prod
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          PROMOTE_SINCE=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-60S +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run promote-web.yaml -f mode=staging-to-prod --ref main
          MAX_ATTEMPTS=10
          ATTEMPT=0
          RUN_ID=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            RUN_ID=$(gh run list --workflow=promote-web.yaml --branch=main \
              --created=">=$PROMOTE_SINCE" --limit=1 \
              --json=databaseId --jq='.[0].databaseId // empty' 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && sleep 60
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::promote-web staging-to-prod run did not appear within timeout"
            exit 1
          fi
          gh run watch "$RUN_ID" --exit-status --interval 60
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Register promote-web staging-to-prod run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.promote_web_prod.outputs.run_id }}
          expected-conclusion: success
          reason: advance-web-promote-staging-to-prod
          upload: 'true'

      - name: Assert web reached prod and api's published state survived
        env:
          API_PROD_BEFORE: ${{ steps.api_before.outputs.api_prod }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3
          ATTEMPT=0
          WEB_PROD=""
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            git fetch origin main --quiet
            git reset --hard origin/main
            WEB_PROD=$(yq eval '.ci.state.components.web.prod.version // ""' .github/manifest.yaml)
            [ -n "$WEB_PROD" ] && break
            ATTEMPT=$((ATTEMPT + 1))
            sleep 60
          done
          if ! echo "$WEB_PROD" | grep -qE '^web-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::web did not advance to prod on its own line: '$WEB_PROD'"
            exit 1
          fi
          API_PROD_AFTER=$(yq eval '.ci.state.components.api.prod.version // ""' .github/manifest.yaml)
          if [ "$API_PROD_AFTER" != "$API_PROD_BEFORE" ]; then
            echo "::error::api prod version changed while web advanced to prod: before='$API_PROD_BEFORE' after='$API_PROD_AFTER'"
            exit 1
          fi
          # Both namespaces coexist: web now has a prod release on the web- line
          # and api's api- tags are still present and untouched.
          git fetch --tags --quiet || true
          if [ -z "$(git tag -l 'web-*')" ]; then
            echo "::error::no web- tag exists after advancing web to prod"
            exit 1
          fi
          if [ -z "$(git tag -l 'api-*')" ]; then
            echo "::error::api- tags disappeared while advancing web to prod"
            exit 1
          fi
          echo "OK: web prod=$WEB_PROD; api prod=$API_PROD_AFTER preserved; both namespaces coexist"

      - name: Final snapshot - both components coexist on independent lines
        if: always()
        run: |
          {
            echo "## advance-web Final Snapshot"
            echo ""
            echo '```yaml'
            yq eval '.ci.state.components' .github/manifest.yaml
            echo '```'
            echo ""
            echo "| Component | dev | staging | prod |"
            echo "|-----------|-----|---------|------|"
            echo "| api | $(yq eval '.ci.state.components.api.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.api.prod.version // "~"' .github/manifest.yaml) |"
            echo "| web | $(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.staging.version // "~"' .github/manifest.yaml) | $(yq eval '.ci.state.components.web.prod.version // "~"' .github/manifest.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

  wave:
    name: Shared-path wave - one commit fires both components concurrently
    runs-on: ubuntu-latest
    needs: advance-web
    steps:
      - name: Install gh transient-retry wrapper
        run: |
          cat > "$RUNNER_TEMP/gh-retry.sh" <<'GHRETRY'
          _gh_is_transient() {
            local out="$1"
            if printf '%s' "$out" | grep -qiE 'HTTP 5[0-9][0-9]|HTTP 429|HTTP 401|Bad credentials|was submitted too quickly|secondary rate limit'; then
              return 0
            fi
            if printf '%s' "$out" | grep -qiE 'HTTP 403'; then
              if printf '%s' "$out" | grep -qiE 'rate limit|secondary|abuse|too quickly'; then
                return 0
              fi
            fi
            return 1
          }
          gh() {
            local attempt=1 max="${GH_RETRY_MAX:-5}" delay="${GH_RETRY_BASE_DELAY:-3}" out rc
            while :; do
              out="$(command gh "$@" 2>&1)" && rc=0 || rc=$?
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              if [ "$attempt" -ge "$max" ] || ! _gh_is_transient "$out"; then
                printf '%s\n' "$out" >&2
                return "$rc"
              fi
              printf 'gh: transient error on attempt %d/%d, retrying in %ds\n%s\n' "$attempt" "$max" "$delay" "$out" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          GHRETRY
          echo "BASH_ENV=$RUNNER_TEMP/gh-retry.sh" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CASCADE_STATE_TOKEN }}
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # A change to the shared library both components consume must advance BOTH
      # component lines. Because orchestrate-api and orchestrate-web each watch
      # libs/common/** and run under their own per-component concurrency group,
      # one trunk commit fans out to two orchestrate runs that execute at the
      # same time and write the same ci.state file concurrently. The proof is
      # postcondition-based and interleaving-independent: both dev lines advance,
      # both tag namespaces gain a fresh rc, and no run exhausts the state-write
      # retry ceiling. That is the guarantee the concurrent-write re-apply gives:
      # the two writers converge rather than one clobbering the other.
      - name: Capture both dev lines before the shared change
        id: before
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          API_DEV_BEFORE=$(yq eval '.ci.state.components.api.dev.version // ""' .github/manifest.yaml)
          WEB_DEV_BEFORE=$(yq eval '.ci.state.components.web.dev.version // ""' .github/manifest.yaml)
          if [ -z "$API_DEV_BEFORE" ] || [ -z "$WEB_DEV_BEFORE" ]; then
            echo "::error::both dev lines must be seeded before the wave: api='$API_DEV_BEFORE' web='$WEB_DEV_BEFORE'"
            exit 1
          fi
          echo "api_dev_before=$API_DEV_BEFORE" >> "$GITHUB_OUTPUT"
          echo "web_dev_before=$WEB_DEV_BEFORE" >> "$GITHUB_OUTPUT"
          echo "before: api dev=$API_DEV_BEFORE web dev=$WEB_DEV_BEFORE"

      - name: Seed ONE shared-library change via pull request
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="scenario/shared-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          # Touch ONLY libs/common/** so neither component's own path changes.
          # The shared path is in both orchestrate path filters, so this single
          # commit fires orchestrate-api AND orchestrate-web off the same sha.
          mkdir -p libs/common
          echo "revision=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > libs/common/version.txt
          git add libs/common/version.txt
          git commit --no-gpg-sign -m "feat: shared library change for both components"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "feat: shared library change for both components" \
            --body "Automated scenario run; one shared-path commit drives both orchestrate workflows concurrently."
          gh pr merge "$BRANCH" --rebase --delete-branch
          git fetch origin main --quiet
          MERGE_SHA=$(git rev-parse origin/main)
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          echo "shared commit merged as $MERGE_SHA"

      - name: Resolve both orchestrate runs off the shared commit
        id: runs
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          MERGE_SHA: ${{ steps.seed.outputs.merge_sha }}
        run: |
          set -euo pipefail
          resolve() {
            local wf="$1" run_id="" attempt=0
            while [ "$attempt" -lt 10 ]; do
              run_id=$(gh run list --workflow="$wf" --branch=main \
                --json=databaseId,headSha \
                --jq=".[] | select(.headSha==\"$MERGE_SHA\") | .databaseId" 2>/dev/null | head -n1)
              [ -n "$run_id" ] && break
              attempt=$((attempt + 1))
              [ "$attempt" -lt 10 ] && sleep 60
            done
            printf '%s' "$run_id"
          }
          API_RUN=$(resolve orchestrate-api.yaml)
          WEB_RUN=$(resolve orchestrate-web.yaml)
          if [ -z "$API_RUN" ] || [ -z "$WEB_RUN" ]; then
            echo "::error::one shared commit did not fan out to both orchestrate runs: api='$API_RUN' web='$WEB_RUN'"
            exit 1
          fi
          echo "api_run=$API_RUN" >> "$GITHUB_OUTPUT"
          echo "web_run=$WEB_RUN" >> "$GITHUB_OUTPUT"
          echo "both fired off $MERGE_SHA: orchestrate-api=$API_RUN orchestrate-web=$WEB_RUN"

      - name: Wait for both orchestrate runs to complete
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          API_RUN: ${{ steps.runs.outputs.api_run }}
          WEB_RUN: ${{ steps.runs.outputs.web_run }}
        run: |
          set -euo pipefail
          # Both were dispatched by the same push and run concurrently on GitHub.
          # Watching them one after the other simply blocks until each concludes.
          gh run watch "$API_RUN" --exit-status --interval 60
          gh run watch "$WEB_RUN" --exit-status --interval 60

      - name: Register orchestrate-api wave run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.runs.outputs.api_run }}
          expected-conclusion: success
          reason: wave-orchestrate-api
          upload: 'true'

      - name: Register orchestrate-web wave run
        uses: stablekernel/cascade/.github/actions/register-run@main
        with:
          run-id: ${{ steps.runs.outputs.web_run }}
          expected-conclusion: success
          reason: wave-orchestrate-web
          upload: 'true'

      - name: Assert convergence without exhausting the state-write ceiling
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TOKEN }}
          API_RUN: ${{ steps.runs.outputs.api_run }}
          WEB_RUN: ${{ steps.runs.outputs.web_run }}
          API_DEV_BEFORE: ${{ steps.before.outputs.api_dev_before }}
          WEB_DEV_BEFORE: ${{ steps.before.outputs.web_dev_before }}
        run: |
          set -euo pipefail

          # 1) Both concurrent writers converged: each dev line advanced past its
          #    pre-wave value and stayed on its own tag line. Neither write was
          #    lost, which is exactly what a clobber would have caused.
          git fetch origin main --quiet
          git reset --hard origin/main
          API_DEV_AFTER=$(yq eval '.ci.state.components.api.dev.version // ""' .github/manifest.yaml)
          WEB_DEV_AFTER=$(yq eval '.ci.state.components.web.dev.version // ""' .github/manifest.yaml)
          if ! echo "$API_DEV_AFTER" | grep -qE '^api-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::api dev line missing or off its line after the wave: '$API_DEV_AFTER'"
            exit 1
          fi
          if ! echo "$WEB_DEV_AFTER" | grep -qE '^web-[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::web dev line missing or off its line after the wave: '$WEB_DEV_AFTER'"
            exit 1
          fi
          if [ "$API_DEV_AFTER" = "$API_DEV_BEFORE" ]; then
            echo "::error::api dev line did not advance on the shared change: still '$API_DEV_AFTER'"
            exit 1
          fi
          if [ "$WEB_DEV_AFTER" = "$WEB_DEV_BEFORE" ]; then
            echo "::error::web dev line did not advance on the shared change: still '$WEB_DEV_AFTER'"
            exit 1
          fi

          # 2) Both tag namespaces gained the freshly computed dev rc.
          git fetch --tags --quiet || true
          if ! git rev-parse -q --verify "refs/tags/$API_DEV_AFTER" >/dev/null; then
            echo "::error::no tag for the new api dev version '$API_DEV_AFTER'"
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$WEB_DEV_AFTER" >/dev/null; then
            echo "::error::no tag for the new web dev version '$WEB_DEV_AFTER'"
            exit 1
          fi

          # 3) The load-bearing proof: neither concurrent writer exhausted the
          #    re-apply retry ceiling. The hardened path re-applies its state
          #    delta onto the latest trunk and retries on a losing push; if it
          #    ever gave up it would log the exhausted marker. Its absence, plus
          #    the presence of the attempt marker, proves the writers retried and
          #    converged rather than hard-failing or clobbering.
          for pair in "api:$API_RUN" "web:$WEB_RUN"; do
            name="${pair%%:*}"
            run_id="${pair#*:}"
            log="$(gh run view "$run_id" --log 2>/dev/null || true)"
            if printf '%s' "$log" | grep -q 'cascade-state-write: exhausted'; then
              echo "::error::$name orchestrate exhausted the state-write retry ceiling"
              printf '%s\n' "$log" | grep 'cascade-state-write:' || true
              exit 1
            fi
            if ! printf '%s' "$log" | grep -q 'cascade-state-write: attempt='; then
              echo "::error::$name orchestrate never emitted a state-write attempt marker"
              exit 1
            fi
            echo "$name state-write markers:"
            printf '%s\n' "$log" | grep 'cascade-state-write:' || true
          done

          echo "OK: shared change advanced api $API_DEV_BEFORE -> $API_DEV_AFTER and web $WEB_DEV_BEFORE -> $WEB_DEV_AFTER; both converged, neither exhausted"

      - name: Wave snapshot
        if: always()
        run: |
          {
            echo "## Shared-path wave snapshot"
            echo ""
            echo "One commit to libs/common/** fired orchestrate-api and orchestrate-web concurrently."
            echo ""
            echo "| Component | dev before | dev after |"
            echo "|-----------|------------|-----------|"
            echo "| api | ${{ steps.before.outputs.api_dev_before }} | $(yq eval '.ci.state.components.api.dev.version // "~"' .github/manifest.yaml) |"
            echo "| web | ${{ steps.before.outputs.web_dev_before }} | $(yq eval '.ci.state.components.web.dev.version // "~"' .github/manifest.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

  reconcile:
    name: Reconcile scenario-window runs
    needs: [reset, advance-api, advance-web, wave]
    if: always()
    uses: stablekernel/cascade/.github/workflows/fleet-reconcile.yaml@main
    permissions:
      contents: read
      actions: read
    with:
      window-start: ${{ needs.reset.outputs.window-start }}
      cascade-ref: main
