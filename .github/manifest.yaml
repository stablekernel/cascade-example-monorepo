ci:
    config:
        schema_version: 1
        trunk_branch: main
        environments:
            - dev
            - staging
            - prod
        cli_version: v0.14.0-dryrun.54
        cli_version_sha: ecd1f832716f99cc2c727844dbc47bdf950e3c3c
        state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
        manifest_file: .github/manifest.yaml
        manifest_key: ci
        shared_paths:
            - libs/common/**
        components:
            api:
                path: services/api
                tag_prefix: api-
                builds:
                    - name: api
                      workflow: .github/workflows/build-api.yaml
                      triggers:
                        - services/api/**
                deploys:
                    - name: api
                      workflow: .github/workflows/deploy-api.yaml
                      triggers:
                        - services/api/**
            web:
                path: apps/web
                tag_prefix: web-
                builds:
                    - name: web
                      workflow: .github/workflows/build-web.yaml
                      triggers:
                        - apps/web/**
                deploys:
                    - name: web
                      workflow: .github/workflows/deploy-web.yaml
                      triggers:
                        - apps/web/**
