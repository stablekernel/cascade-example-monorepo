ci:
  config:
    schema_version: 1
    trunk_branch: main
    environments:
      - dev
      - staging
      - prod
    cli_version: v0.16.2-rc.2
    cli_version_sha: 24a911250c5f899cac8bbe97a5170286c99978fb
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    shared_paths:
      - libs/common/**
    components:
      api:
        path: services/api
        tag_grammar:
          prefix: api-
        builds:
          - name: api
            workflow: .github/workflows/build-api.yaml
            triggers:
              - services/api/**
        deploys:
          - name: api
            workflow: .github/workflows/deploy-api.yaml
            triggers:
              - services/api/**
      web:
        path: apps/web
        tag_grammar:
          prefix: web-
        builds:
          - name: web
            workflow: .github/workflows/build-web.yaml
            triggers:
              - apps/web/**
        deploys:
          - name: web
            workflow: .github/workflows/deploy-web.yaml
            triggers:
              - apps/web/**
  state: {}
  latest_release:
    components:
      api:
        version: api-0.3.0
        sha: fd225f4e4e2aa2f81b5e3412936e65196eef0bda
        released_on: "2026-07-16T19:52:47Z"
      web:
        version: web-0.1.0
        sha: 1528a6e3a75969712633fb3fcb463c33e6030b7f
        released_on: "2026-07-16T19:33:17Z"
