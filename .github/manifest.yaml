                    committed_at: "2026-07-20T19:25:05Z"
                    committed_by: joshua-temple
                    deploys:
                        api:
                            sha: 2a44c6cfc81f6868353a2e18b860d113c2cb8f5f
                            deployed_at: "2026-07-20T19:25:05Z"
                            deployed_by: joshua-temple
                staging:
                    sha: 2a44c6cfc81f6868353a2e18b860d113c2cb8f5f
                    version: api-0.1.0-rc.0
                    committed_at: "2026-07-20T19:26:10Z"
