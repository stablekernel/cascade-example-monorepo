ci:
  config:
    schema_version: 1
    trunk_branch: main
    environments:
      - dev
      - staging
      - prod
    cli_version: v0.16.3-rc.1
    cli_version_sha: 708cd047998303cc463701d46233db3e4231d316
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    shared_paths:
      - libs/common/**
    components:
      api:
        path: services/api
        tag_grammar:
          prefix: api-
        builds:
          - name: api
            workflow: .github/workflows/build-api.yaml
            triggers:
              - services/api/**
        deploys:
          - name: api
            workflow: .github/workflows/deploy-api.yaml
            triggers:
              - services/api/**
      web:
        path: apps/web
        tag_grammar:
          prefix: web-
        builds:
          - name: web
            workflow: .github/workflows/build-web.yaml
            triggers:
              - apps/web/**
        deploys:
          - name: web
            workflow: .github/workflows/deploy-web.yaml
            triggers:
              - apps/web/**
  state: {}
  latest_release:
    components:
      api:
        version: api-0.3.0
        sha: d552ed9fe73b43bb9312185da667d0b23a3d63e2
        released_on: "2026-07-17T08:44:41Z"
      web:
        version: web-0.1.0
        sha: 7af9d19b288eebc7ec37bd2a4f8e04212c926f0b
        released_on: "2026-07-17T08:27:14Z"
