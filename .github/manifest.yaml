ci:
  config:
    schema_version: 1
    trunk_branch: main
    environments:
      - dev
      - staging
      - prod
    cli_version: v0.16.5-rc.2
    cli_version_sha: 2231b2bee90615ffb66cdee3a3cfd410720df370
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    shared_paths:
      - libs/common/**
    components:
      api:
        path: services/api
        tag_grammar:
          prefix: api-
        builds:
          - name: api
            workflow: .github/workflows/build-api.yaml
            triggers:
              - services/api/**
        deploys:
          - name: api
            workflow: .github/workflows/deploy-api.yaml
            triggers:
              - services/api/**
      web:
        path: apps/web
        tag_grammar:
          prefix: web-
        builds:
          - name: web
            workflow: .github/workflows/build-web.yaml
            triggers:
              - apps/web/**
        deploys:
          - name: web
            workflow: .github/workflows/deploy-web.yaml
            triggers:
              - apps/web/**
  state: {}
  latest_release:
    components:
      api:
        version: api-0.3.0
        sha: a980c3a165f33820f3a6abb168919de9d1a249d8
        released_on: "2026-07-19T20:24:46Z"
      web:
        version: web-0.1.0
        sha: ec460ecf4500dfa028eb7d6d5e556414e6679582
        released_on: "2026-07-19T20:07:45Z"
