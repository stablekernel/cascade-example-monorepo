ci:
  config:
    schema_version: 1
    trunk_branch: main
    environments:
      - dev
      - staging
      - prod
    cli_version: v0.16.6-dryrun.83
    cli_version_sha: 82d7a676a50e7a54ad666d0f55277dcf04415cfb
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    shared_paths:
      - libs/common/**
    components:
      api:
        path: services/api
        tag_grammar:
          prefix: api-
        builds:
          - name: api
            workflow: .github/workflows/build-api.yaml
            triggers:
              - services/api/**
        deploys:
          - name: api
            workflow: .github/workflows/deploy-api.yaml
            triggers:
              - services/api/**
      web:
        path: apps/web
        tag_grammar:
          prefix: web-
        builds:
          - name: web
            workflow: .github/workflows/build-web.yaml
            triggers:
              - apps/web/**
        deploys:
          - name: web
            workflow: .github/workflows/deploy-web.yaml
            triggers:
              - apps/web/**
  state: {}
  latest_release:
    components:
      api:
        version: api-0.3.0
        sha: 03734be22f657c0f79ca60d7564b2ecdf10acc2a
        released_on: "2026-07-20T21:59:32Z"
      web:
        version: web-0.1.0
        sha: c842f5b494b9d9f0b29c9e8e9df4a94c1e2370c2
        released_on: "2026-07-20T21:42:35Z"
