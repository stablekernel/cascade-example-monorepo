ci:
  config:
    schema_version: 1
    trunk_branch: main
    environments:
      - dev
      - staging
      - prod
    cli_version: v0.16.6-rc.1
    cli_version_sha: 82d7a676a50e7a54ad666d0f55277dcf04415cfb
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    shared_paths:
      - libs/common/**
    components:
      api:
        path: services/api
        tag_grammar:
          prefix: api-
        builds:
          - name: api
            workflow: .github/workflows/build-api.yaml
            triggers:
              - services/api/**
        deploys:
          - name: api
            workflow: .github/workflows/deploy-api.yaml
            triggers:
              - services/api/**
      web:
        path: apps/web
        tag_grammar:
          prefix: web-
        builds:
          - name: web
            workflow: .github/workflows/build-web.yaml
            triggers:
              - apps/web/**
        deploys:
          - name: web
            workflow: .github/workflows/deploy-web.yaml
            triggers:
              - apps/web/**
  state: {}
  latest_release:
    components:
      api:
        version: api-0.3.0
        sha: 36e8736a6b78e72de4cec8d67cd8d061445ec5f8
        released_on: "2026-07-20T23:36:46Z"
      web:
        version: web-0.1.0
        sha: 81b36980b8c78b77b2d0537232183bdbbf9f010d
        released_on: "2026-07-20T23:18:54Z"
