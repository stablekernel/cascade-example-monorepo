ci:
    config:
        schema_version: 1
        trunk_branch: main
        environments:
            - dev
            - staging
            - prod
        cli_version: v0.12.0-rc.0
        cli_version_sha: 0147f31d7d60bb5a6e46f96ae3d375e422f484fd
        state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
        manifest_file: .github/manifest.yaml
        manifest_key: ci
        components:
            api:
                path: services/api
                tag_prefix: api-
                builds:
                    - name: api
                      workflow: .github/workflows/build-api.yaml
                      triggers:
                        - services/api/**
                deploys:
                    - name: api
                      workflow: .github/workflows/deploy-api.yaml
                      triggers:
                        - services/api/**
            web:
                path: apps/web
                tag_prefix: web-
                builds:
                    - name: web
                      workflow: .github/workflows/build-web.yaml
                      triggers:
                        - apps/web/**
                deploys:
                    - name: web
                      workflow: .github/workflows/deploy-web.yaml
                      triggers:
                        - apps/web/**
    state: {}
