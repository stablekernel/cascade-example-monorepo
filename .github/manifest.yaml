ci:
    config:
        schema_version: 1
        trunk_branch: main
        environments:
            - dev
            - staging
            - prod
        cli_version: v0.16.3-rc.0
        cli_version_sha: 8451b21446c698ec3dff9869fbc071109e7b34de
        state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
        manifest_file: .github/manifest.yaml
        manifest_key: ci
        shared_paths:
            - libs/common/**
        components:
            api:
                path: services/api
                tag_grammar:
                    prefix: api-
                builds:
                    - name: api
                      workflow: .github/workflows/build-api.yaml
                      triggers:
                        - services/api/**
                deploys:
                    - name: api
                      workflow: .github/workflows/deploy-api.yaml
                      triggers:
                        - services/api/**
            web:
                path: apps/web
                tag_grammar:
                    prefix: web-
                builds:
                    - name: web
                      workflow: .github/workflows/build-web.yaml
                      triggers:
                        - apps/web/**
                deploys:
                    - name: web
                      workflow: .github/workflows/deploy-web.yaml
                      triggers:
                        - apps/web/**
